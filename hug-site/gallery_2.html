/* =============================================
   ギャラリーグリッド

   【画像の追加方法】
   .gallery-grid の中に以下をコピーして追加するだけ！

   <div class="gallery-item">
     <img src="ファイル名.jpg" alt="説明" loading="lazy">
   </div>

   ・画像は正方形（1:1比率）で用意すると綺麗に表示されます
   ・loading="lazy" はそのまま残してください（表示速度改善）
   ============================================= */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 3px;
  max-width: 960px;
  margin: 0 auto 5rem;
  padding: 0 1rem;
}

@media (max-width: 600px) {
  .gallery-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 2px;
    padding: 0 0.5rem;
  }
}

.gallery-item {
  position: relative;
  overflow: hidden;
  aspect-ratio: 1 / 1;
  background: #f7eff2;
  cursor: pointer;
}

.gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.4s ease;
  filter: brightness(0.96) saturate(0.95);
}

.gallery-item:hover img {
  transform: scale(1.05);
  filter: brightness(1.01) saturate(1.05);
}

.gallery-item-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fce8f0;
  font-size: 12px;
  color: #e8a0b8;
}

/* ライトボックス（クリックで拡大） */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(18, 8, 12, 0.94);
  z-index: 999;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  cursor: pointer;
}
.lightbox.open { display: flex; }

.lightbox-img-wrap {
  position: relative;
  cursor: default;
}
.lightbox img {
  max-width: min(88vw, 680px);
  max-height: 88vh;
  object-fit: contain;
  display: block;
  border-radius: 3px;
}

.lightbox-close {
  position: fixed;
  top: 1.25rem;
  right: 1.25rem;
  width: 38px;
  height: 38px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 50%;
  color: rgba(255,255,255,0.8);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  font-family: sans-serif;
}
.lightbox-close:hover { background: rgba(255,255,255,0.2); }

}
.menu-btn:hover { translate: 1px 1px; box-shadow: 1px 1px 0 var(--ink); }
.menu-btn .dot {

  border-radius: 50%;
  background: var(--pink);
  border: 1.5px solid var(--ink);

/* ドロワー */
.drawer {

  z-index: 300;

.drawer-nav a {

.drawer-nav a:hover { background: var(--blue-pale); color: var(--blue-dark); border-color: var(--blue); }
.overlay {

  inset: 0;
  background: rgba(42,32,48,0.3);
  z-index: 250;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  backdrop-filter: blur(2px);
}
.overlay.open { opacity: 1; pointer-events: auto; }

<script>
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const lightboxClose = document.getElementById('lightbox-close');

function openLightbox(src, alt) {
  lightboxImg.src = src;
  lightboxImg.alt = alt;
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
}

document.querySelectorAll('.gallery-item img').forEach(img => {
  img.addEventListener('click', () => openLightbox(img.src, img.alt));
});

lightbox.addEventListener('click', e => {
  if (e.target === lightbox) closeLightbox();
});

lightboxClose.addEventListener('click', closeLightbox);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});
</script>

<script>
const menuBtn  = document.getElementById('menuBtn');
const drawer   = document.getElementById('drawer');
const overlay  = document.getElementById('overlay');
function openDrawer()  { drawer.classList.add('open');  overlay.classList.add('open');  }
function closeDrawer() { drawer.classList.remove('open'); overlay.classList.remove('open'); }
menuBtn.addEventListener('click', () => drawer.classList.contains('open') ? closeDrawer() : openDrawer());
overlay.addEventListener('click', closeDrawer);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });
</script>
