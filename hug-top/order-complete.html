<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>送信完了 | hug nui² studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #fdf0f4;
  min-height: 100vh;
  padding: 2.5rem 1rem 5rem;
  background-image: radial-gradient(circle, rgba(168,216,234,0.25) 1.5px, transparent 1.5px);
  background-size: 28px 28px;
}

/* ステップ */
.steps { display: flex; align-items: center; justify-content: center; max-width: 360px; margin: 0 auto 2rem; }
.step { display: flex; flex-direction: column; align-items: center; gap: 0.3rem; flex: 1; }
.step-circle { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Zen Maru Gothic', sans-serif; font-size: 13px; font-weight: 700; border: 2.5px solid #ddd; background: #fff; color: #ccc; }
.step-circle.done { background: #a8d8ea; border-color: #5ba4c7; color: #2a2030; }
.step-label { font-size: 15px; color: #b0a0b8; font-family: 'Zen Maru Gothic', sans-serif; }
.step-line { height: 2px; background: #a8d8ea; flex: 1; margin-bottom: 1.4rem; max-width: 40px; }

/* =====================
   PC：2カラムレイアウト
   ===================== */
.layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.25rem;
  max-width: 1100px;
  margin: 0 auto;
  align-items: stretch;
}
@media (min-width: 681px) {
  .layout {
    grid-template-columns: 1fr 48px 1fr;
    gap: 0;
    column-gap: 0;
  }
}

/* =====================
   左カラム：STEP1完了
   ===================== */
.complete-card {
  background: #fff; border-radius: 20px; border: 2.5px solid #2a2030;
  box-shadow: 5px 5px 0 #2a2030; padding: 1.75rem;
  opacity: 0; transform: translateY(16px);
  animation: fadeUp 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.1s forwards;
  max-width: 800px;
  margin: 0 auto;

}
@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

.complete-header {
  display: flex; align-items: center; gap: 0.75rem;
  margin-bottom: 1.25rem; padding-bottom: 1rem;
  border-bottom: 1px solid #fce8f0;
}
.complete-icon { font-size: 32px; flex-shrink: 0; }
.complete-title { font-family: 'Zen Maru Gothic', sans-serif; font-size: 20px; font-weight: 700; color: #2a2030; }
.complete-sub { font-size: 13px; color: #6a5870; line-height: 1.7; margin-top: 0.2rem; }

/* 依頼番号 */
.order-id-banner {
  background: #2a2030; border-radius: 12px; padding: 0.9rem 1.1rem;
  margin-bottom: 1rem; text-align: center;
  cursor: pointer; user-select: none;
  transition: opacity 0.15s, transform 0.1s;
  position: relative;
}
.order-id-banner:hover { opacity: 0.88; transform: scale(0.99); }
.order-id-banner:active { transform: scale(0.97); }
.order-id-label { font-size: 10px; letter-spacing: 0.3em; color: #a8d8ea; text-transform: uppercase; margin-bottom: 0.35rem; font-family: 'Zen Maru Gothic', sans-serif; }
.order-id-value { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: 0.1em; font-family: 'Zen Maru Gothic', sans-serif; }
.order-id-hint { font-size: 14px; color: rgba(255, 255, 255, 1); margin-top: 6px; font-family: 'Zen Maru Gothic', sans-serif; }
.copy-toast {
  position: fixed; top: 1.5rem; left: 50%; transform: translateX(-50%) translateY(-8px);
  background: #2a2030; color: #a8d8ea; font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 13px; font-weight: 700; padding: 0.55rem 1.25rem;
  border-radius: 20px; border: 1.5px solid #5ba4c7;
  box-shadow: 0 4px 16px rgba(42,32,48,0.25);
  opacity: 0; pointer-events: none; z-index: 500;
  transition: opacity 0.2s, transform 0.2s;
}
.copy-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
/* つなぐボタン */
.tsunagu-btn {
  display: block; width: 100%; max-width: 800px; margin: 1.25rem auto 0;
  padding: 1rem; background: #a8d8ea; border: 2.5px solid #2a2030; border-radius: 14px;
  font-family: 'Zen Maru Gothic', sans-serif; font-size: 16px; font-weight: 700;
  color: #2a2030; text-align: center; text-decoration: none;
  box-shadow: 4px 4px 0 #2a2030; letter-spacing: 0.04em;
  transition: translate 0.1s, box-shadow 0.1s, background 0.15s;
  opacity: 0; animation: fadeUp 0.5s ease 0.35s forwards;
}
.tsunagu-btn:hover { translate: 2px 2px; box-shadow: 2px 2px 0 #2a2030; background: #5ba4c7; color: #fff; }

/* サマリー */
.summary { background: #fef0f5; border-radius: 12px; padding: 0.85rem 1rem; margin-bottom: 1rem; }
.summary-title { font-size: 10px; letter-spacing: 0.2em; color: #d96a8a; text-transform: uppercase; font-weight: 700; font-family: 'Zen Maru Gothic', sans-serif; margin-bottom: 0.6rem; }
.summary-row { display: flex; gap: 0.5rem; padding: 0.35rem 0; border-bottom: 1px solid rgba(247,184,204,0.4); font-size: 12px; }
.summary-row:last-child { border-bottom: none; padding-bottom: 0; }
.summary-key { color: #b0a0b8; width: 72px; flex-shrink: 0; font-size: 12px; padding-top: 1px; }
.summary-val { color: #2a2030; font-weight: 700; word-break: break-all; font-family: 'Zen Maru Gothic', sans-serif; font-size: 13px; }

/* メール通知 */
.mail-notice { background: #e8f4fa; border-radius: 10px; padding: 0.75rem 1rem; font-size: 13px; color: #2a5870; line-height: 1.75; }

/* =====================
   右カラム：STEP2
   ===================== */
.step2-card {
  background: #fff; border-radius: 20px; border: 2.5px solid #2a2030;
  box-shadow: 5px 5px 0 #2a2030; padding: 1.75rem;
  opacity: 0; transform: translateY(16px);
  animation: fadeUp 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.25s forwards;
  position: sticky; top: 1.5rem;
  display: flex; flex-direction: column;
}
/* 画像とボタンの間を自動で広げて高さを合わせる */
.step2-spacer { flex: 1; }
.step2-eyebrow { font-size: 10px; letter-spacing: 0.25em; color: #5ba4c7; text-transform: uppercase; font-weight: 700; font-family: 'Zen Maru Gothic', sans-serif; margin-bottom: 0.4rem; }
.step2-title { font-family: 'Zen Maru Gothic', sans-serif; font-size: 19px; font-weight: 700; color: #2a2030; margin-bottom: 0.5rem; }
.step2-desc { font-size: 14px; color: #6a5870; line-height: 1.85; margin-bottom: 1.25rem; }
.step2-note { font-size: 12px; color: #b0a0b8; margin-top: 0.35rem; }

/* 提出期限バナー */
.deadline-banner {
  display: flex; align-items: flex-start; gap: 0.6rem;
  background: #fff8e6; border: 2px solid #e8a020; border-radius: 12px;
  padding: 0.85rem 1rem; margin-bottom: 1.25rem;
  animation: deadlinePulse 2.5s ease-in-out 1s 3;
}
@keyframes deadlinePulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(232,160,32,0); }
  50%       { box-shadow: 0 0 0 6px rgba(232,160,32,0.3); }
}
.deadline-icon { font-size: 22px; flex-shrink: 0; line-height: 1; margin-top: 1px; }
.deadline-body { flex: 1; }
.deadline-label { font-size: 10px; letter-spacing: 0.2em; color: #b87000; font-weight: 700;
  font-family: 'Zen Maru Gothic', sans-serif; text-transform: uppercase; margin-bottom: 0.25rem; }
.deadline-main { font-family: 'Zen Maru Gothic', sans-serif; font-size: 14px; color: #2a2030; line-height: 1.6; }
.deadline-main strong { font-size: 18px; color: #c05c00; letter-spacing: 0.02em; }

/* CTAボタン */
.cta-btn {
  display: block; width: 100%; padding: 1.1rem;
  background: #f7b8cc; border: 2.5px solid #2a2030; border-radius: 14px;
  font-family: 'Zen Maru Gothic', sans-serif; font-size: 15px; font-weight: 700;
  color: #2a2030; text-align: center; text-decoration: none;
  font-size: 17px;
  box-shadow: 4px 4px 0 #2a2030; letter-spacing: 0.04em;
  transition: translate 0.1s, box-shadow 0.1s, background 0.15s;
}
.cta-btn:hover { translate: 2px 2px; box-shadow: 2px 2px 0 #2a2030; background: #d96a8a; color: #fff; }

.later-link { text-align: center; margin-top: 0.75rem; }
.later-link a { font-size: 13px; color: #b0a0b8; text-decoration: none; font-family: 'Zen Maru Gothic', sans-serif; }
.later-link a:hover { color: #5ba4c7; }

.top-link { text-align: center; margin-top: 1.25rem; opacity: 0; animation: fadeUp 0.5s ease 0.5s forwards; }
.top-link a { font-size: 13px; color: #b0a0b8; text-decoration: none; font-family: 'Zen Maru Gothic', sans-serif; }
.top-link a:hover { color: #d96a8a; }

/* =====================
   PC：STEP間の矢印
   ===================== */
.step-arrow {
  display: none; /* スマホでは非表示 */
}
@media (min-width: 681px) {
  .step-arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    align-self: center;
    width: 0;
    height: 0;
    border-top: 30px solid transparent;
    border-bottom: 30px solid transparent;
    border-left: 28px solid #2a2030;
    flex-shrink: 0;
    opacity: 0;
    animation: fadeUp 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.4s forwards;
  }
}

/* =====================
   スマホ：スクロール誘導バナー
   ===================== */
.scroll-hint {
  display: none; /* JSで制御 */
  position: fixed;
  bottom: 1.25rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  background: #2a2030;
  color: #fff;
  border-radius: 30px;
  padding: 0.65rem 1.35rem;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.04em;
  box-shadow: 0 4px 16px rgba(42,32,48,0.3);
  cursor: pointer;
  white-space: nowrap;
  animation: hintBounce 1.8s ease-in-out infinite;
}
.scroll-hint.visible { display: flex; align-items: center; gap: 0.5rem; }

/* 作品イメージ画像 */
.sample-img {
  width: 100%; border-radius: 16px;
  border: 2px solid #f7b8cc;
  margin-bottom: 1.25rem;
  display: block;
  object-fit: cover;
}
@keyframes hintBounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50%       { transform: translateX(-50%) translateY(-5px); }
}

/* =====================
   レスポンシブ
   ===================== */
@media (max-width: 680px) {
  .layout {
    grid-template-columns: 1fr; /* スマホは縦積み */
    max-width: 480px;
  }
  .step2-card { position: static; display: block; } /* スマホではstickyを解除 */
}
</style>
</head>
<body>
<div class="wrap">

  <!-- ステップ（全部done） -->
  <div class="steps">
    <div class="step"><div class="step-circle done">✓</div><div class="step-label">タイプ選択</div></div>
    <div class="step-line"></div>
    <div class="step"><div class="step-circle done">✓</div><div class="step-label">時期選択</div></div>
    <div class="step-line"></div>
    <div class="step"><div class="step-circle done">✓</div><div class="step-label">フォーム入力</div></div>
  </div>

  <!-- 2カラムレイアウト -->
  

    <!-- 左：STEP1完了 -->
    <div class="complete-card">
      <div class="complete-header">
        <span class="complete-icon">🎉</span>
        <div>
          <div class="complete-title">オーダー番号を発行しました！</div>
          <div class="complete-sub">下記のオーダー番号をコピーして、つなぐのメッセージに送信してください。</div>
        </div>
      </div>

      <div class="order-id-banner" onclick="copyOrderId()" title="タップしてコピー">
        <div class="order-id-label">オーダー番号 / Order Number</div>
        <div class="order-id-value" id="orderIdDisplay">-</div>
        <div class="order-id-hint">📋 タップ(クリック)してコピー</div>
      </div>

      <div class="summary">
        <div class="summary-title">ご依頼内容</div>
        <div class="summary-row"><span class="summary-key">タイプ</span><span class="summary-val" id="sType">-</span></div>
        <div class="summary-row"><span class="summary-key">希望時期</span><span class="summary-val" id="sPeriod">-</span></div>
        <div class="summary-row"><span class="summary-key">お名前</span><span class="summary-val" id="sName">-</span></div>
        <div class="summary-row"><span class="summary-key">メール</span><span class="summary-val" id="sEmail">-</span></div>
        <div class="summary-row"><span class="summary-key">つなぐID</span><span class="summary-val" id="sTsunaguId">-</span></div>
      </div>

      <div class="mail-notice">
        📧 <strong id="sEmailInline">-</strong> 宛に確認メールをお送りしました。<br>
        <span style="font-size:11px;color:#5ba4c7;">届いていない場合は迷惑メールフォルダをご確認ください。</span>
      </div>
    </div>



  <a class="tsunagu-btn" id="tsunaguBtn" href="#" target="_blank">
    つなぐのメッセージページへ移動する →
  </a>

</div>
<div class="copy-toast" id="copyToast">✓ コピーしました！</div>

</div>

<script>
history.pushState(null, '', location.href);
// =============================================
// ★ URLを設定してください ★
// =============================================
const STEP2_URL   = 'https://docs.google.com/forms/d/e/1FAIpQLSe9rP0Lgb5A1jpdCGLWVLU5GHJAMm9j2Os7-Hp7NOX4INaIZA/viewform?usp=dialog';
const TSUNAGU_URL = 'https://tsunagu.cloud/rooms/83983'; // ← つなぐのメッセージページURLに置き換え
// =============================================

// URLパラメータから情報を復元
const params = new URLSearchParams(location.search);
const orderId     = params.get('orderId')     ?? '';
const name        = params.get('name')        ?? '';
const type        = params.get('type')        ?? '';
const periodLabel = params.get('periodLabel') ?? '';
const email       = params.get('email')       ?? '';
const tsunaguId   = params.get('tsunaguId')   ?? '';

// パラメータがなければトップへ
if (!orderId) { location.href = '../hug-site/index.html'; }

// 表示を埋める
document.getElementById('orderIdDisplay').textContent = orderId;
document.getElementById('sType').textContent          = type        || '-';
document.getElementById('sPeriod').textContent        = periodLabel || '-';
document.getElementById('sName').textContent          = name        || '-';
document.getElementById('sEmail').textContent         = email       || '-';
document.getElementById('sTsunaguId').textContent     = tsunaguId   || '未記入';
document.getElementById('sEmailInline').textContent   = email       || '-';

// つなぐボタンにURLを設定
const tsunaguBtn = document.getElementById('tsunaguBtn');
if (TSUNAGU_URL && !TSUNAGU_URL.includes('example.com')) {
  tsunaguBtn.href = TSUNAGU_URL;
} else {
  tsunaguBtn.style.opacity = '0.5';
  tsunaguBtn.style.cursor  = 'not-allowed';
  tsunaguBtn.removeAttribute('href');
  tsunaguBtn.addEventListener('click', e => e.preventDefault());
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// オーダー番号コピー
function copyOrderId() {
  const id = document.getElementById('orderIdDisplay').textContent;
  navigator.clipboard.writeText(id).then(() => {
    const toast = document.getElementById('copyToast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }).catch(() => {
    // フォールバック：選択してコピーを促す
    const range = document.createRange();
    range.selectNodeContents(document.getElementById('orderIdDisplay'));
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  });
}
</script>
</body>
</html>
