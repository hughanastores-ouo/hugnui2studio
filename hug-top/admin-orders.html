<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>依頼一覧 | hug nui² studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#fdf0f4;min-height:100vh;padding:2rem 1rem 5rem;background-image:radial-gradient(circle,rgba(168,216,234,.25) 1.5px,transparent 1.5px);background-size:28px 28px}
.page-header{text-align:center;margin-bottom:2rem}
.page-title{font-family:'Zen Maru Gothic',sans-serif;font-size:22px;font-weight:700;color:#2a2030}
.page-title small{display:block;font-size:11px;color:#b0a0b8;font-weight:400;margin-top:.25rem;letter-spacing:.1em}
.page-nav{display:flex;gap:.5rem;justify-content:center;margin-top:.75rem}
.page-nav a{font-family:'Zen Maru Gothic',sans-serif;font-size:12px;font-weight:700;padding:.35rem .85rem;border-radius:20px;border:1.5px solid #f7b8cc;background:#fff;color:#6a5870;text-decoration:none;transition:background .15s}
.page-nav a:hover{background:#fef0f5}
.page-nav a.active{background:#f7b8cc;border-color:#d96a8a;color:#2a2030}

/* カレンダービュー */
.wrap{max-width:1000px;margin:0 auto}
.view-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:.75rem}
.view-title{font-family:'Zen Maru Gothic',sans-serif;font-size:18px;font-weight:700;color:#2a2030}
.reload-btn{font-family:'Zen Maru Gothic',sans-serif;font-size:12px;font-weight:700;padding:.4rem .9rem;border-radius:20px;border:2px solid #2a2030;background:#fff;color:#2a2030;cursor:pointer;box-shadow:2px 2px 0 #2a2030;transition:translate .1s,box-shadow .1s}
.reload-btn:hover{translate:1px 1px;box-shadow:1px 1px 0 #2a2030}

/* カレンダーグリッド（旬ベース） */
.cal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.85rem;margin-bottom:2rem}
@media(max-width:600px){.cal-grid{grid-template-columns:1fr}}

.phase-card{background:#fff;border-radius:16px;border:2.5px solid #2a2030;box-shadow:4px 4px 0 #2a2030;overflow:hidden}
.phase-card-head{padding:.65rem 1rem;display:flex;align-items:center;justify-content:space-between}
.phase-card-head.open{background:#a8d8ea}
.phase-card-head.closed{background:#eee}
.phase-name{font-family:'Zen Maru Gothic',sans-serif;font-size:13px;font-weight:700;color:#2a2030}
.phase-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;font-family:'Zen Maru Gothic',sans-serif}
.phase-badge.open{background:#2a2030;color:#fff}
.phase-badge.closed{background:#999;color:#fff}
.phase-card-body{padding:.75rem 1rem}
.order-count{font-family:'Zen Maru Gothic',sans-serif;font-size:11px;color:#b0a0b8;margin-bottom:.5rem}
.order-count span{color:#2a2030;font-weight:700}
.order-item{background:#fef0f5;border:1.5px solid #f7b8cc;border-radius:8px;padding:.5rem .75rem;margin-bottom:.4rem;cursor:pointer;transition:background .15s}
.order-item:hover{background:#f7b8cc}
.order-item:last-child{margin-bottom:0}
.order-item-name{font-family:'Zen Maru Gothic',sans-serif;font-size:12px;font-weight:700;color:#2a2030}
.order-item-type{font-size:10px;color:#b0a0b8;margin-top:1px}
.order-item-status{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;font-family:'Zen Maru Gothic',sans-serif;margin-top:2px}
.status-pending{background:#fef3c7;color:#92400e}
.status-confirmed{background:#d1fae5;color:#065f46}
.status-rejected{background:#fee2e2;color:#991b1b}
.phase-empty{font-size:12px;color:#d0c0d8;font-family:'Zen Maru Gothic',sans-serif;text-align:center;padding:.5rem 0}

/* 依頼詳細モーダル */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(42,32,48,.4);z-index:200;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(3px)}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:20px;border:2.5px solid #2a2030;box-shadow:6px 6px 0 #2a2030;padding:1.5rem;width:100%;max-width:440px;max-height:85vh;overflow-y:auto}
.modal-title{font-family:'Zen Maru Gothic',sans-serif;font-size:16px;font-weight:700;color:#2a2030;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid #fce8f0}
.detail-row{margin-bottom:.75rem}
.detail-label{font-size:10px;letter-spacing:.15em;color:#b0a0b8;font-family:'Zen Maru Gothic',sans-serif;text-transform:uppercase;margin-bottom:.2rem}
.detail-value{font-family:'Zen Maru Gothic',sans-serif;font-size:13px;font-weight:700;color:#2a2030;word-break:break-all}
.detail-value.desc{font-weight:400;line-height:1.8;font-size:12.5px}
.modal-actions{display:flex;gap:.5rem;margin-top:1.25rem;flex-wrap:wrap}
.action-btn{flex:1;padding:.6rem .5rem;border-radius:10px;border:2px solid #2a2030;font-family:'Zen Maru Gothic',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:translate .1s,box-shadow .1s;box-shadow:2px 2px 0 #2a2030}
.action-btn:hover{translate:1px 1px;box-shadow:1px 1px 0 #2a2030}
.btn-confirm{background:#a8d8ea;color:#2a2030}
.btn-reject{background:#fce8f0;color:#c0405a}
.btn-close{background:#fff;color:#666}
.modal-msg{font-size:11px;color:#2a7a50;text-align:center;margin-top:.5rem;display:none}
.modal-msg.show{display:block}

.loading{text-align:center;padding:3rem;font-family:'Zen Maru Gothic',sans-serif;font-size:13px;color:#b0a0b8}
.config-note{max-width:1000px;margin:1.25rem auto 0;padding:.85rem 1rem;background:#fef9e8;border:1.5px solid #ffe27a;border-radius:12px;font-size:11.5px;color:#7a6a20;line-height:1.8}
.config-note code{background:rgba(0,0,0,.07);padding:1px 5px;border-radius:4px;font-size:11px}
</style>
</head>
<body>
<div class="page-header">
  <div class="page-title">依頼一覧<small>hug nui² studio admin</small></div>
  <div class="page-nav">
    <a href="admin.html">ステータス・スケジュール</a>
    <a href="admin-orders.html" class="active">依頼一覧</a>
  </div>
</div>

<div class="wrap">
  <div class="view-header">
    <div class="view-title" id="viewTitle">依頼カレンダー</div>
    <button class="reload-btn" onclick="loadAll()">🔄 再読み込み</button>
  </div>
  <div id="calContainer"><div class="loading">読み込み中...</div></div>
</div>

<div class="config-note">
  ⚙️ <code>BIN1_ID</code>・<code>BIN2_ID</code>・<code>X_KEY</code> に JSONBinの値を入れてください。
</div>

<!-- 依頼詳細モーダル -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">📋 依頼詳細</div>
    <div id="modalBody"></div>
    <div class="modal-actions">
      <button class="action-btn btn-confirm" onclick="updateStatus('confirmed')">✓ 制作可</button>
      <button class="action-btn btn-reject"  onclick="updateStatus('rejected')">✕ 制作不可</button>
      <button class="action-btn btn-close"   onclick="closeModal()">閉じる</button>
    </div>
    <div class="modal-msg" id="modalMsg"></div>
  </div>
</div>

<script>
// =============================================
// ★ JSONBinの設定を入れてください ★
// =============================================
const BIN1_ID = '69c3843daa77b81da918a941';    // ← ステータス・スケジュールBin
const BIN2_ID = '69c3a2fac3097a1dd55a28e3'; // 依頼データBin
const X_KEY   = '$2a$10$KFVz/3GKzgslRLpOZVkMYuNSlAefLbU8/bd7W7R/aW2xv5pe..Nza'; // ← Access Key
// =============================================

const H = { 'Content-Type': 'application/json', 'X-Access-Key': X_KEY };
const PL = { early: '上旬', mid: '中旬', late: '下旬' };
const STATUS_LABEL = { pending: '確認待ち', confirmed: '制作可', rejected: '制作不可' };

let scheduleData = {};
let ordersData   = [];
let currentOrder = null;

async function loadAll() {
  document.getElementById('calContainer').innerHTML = '<div class="loading">読み込み中...</div>';
  try {
    const [r1, r2] = await Promise.all([
      fetch(`https://api.jsonbin.io/v3/b/${BIN1_ID}/latest`, { headers: H }).then(r => r.json()),
      fetch(`https://api.jsonbin.io/v3/b/${BIN2_ID}/latest`, { headers: H }).then(r => r.json()),
    ]);
    scheduleData = r1.record?.schedule ?? {};
    ordersData   = r2.record?.orders   ?? [];
  } catch {
    scheduleData = {}; ordersData = [];
  }
  renderCalendar();
}

function renderCalendar() {
  const now = new Date();
  let html = '<div class="cal-grid">';

  for (let i = 0; i < 4; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    const y = d.getFullYear(), m = d.getMonth() + 1;
    const mStr = `${y}-${String(m).padStart(2, '0')}`;

    ['early', 'mid', 'late'].forEach(phase => {
      const key    = `${mStr}-${phase}`;
      const isOpen = scheduleData[key]?.open ?? false;
      const orders = ordersData.filter(o => o.periodKey === key);

      html += `<div class="phase-card">
        <div class="phase-card-head ${isOpen ? 'open' : 'closed'}">
          <span class="phase-name">${y}年${m}月${PL[phase]}</span>
          <span class="phase-badge ${isOpen ? 'open' : 'closed'}">${isOpen ? '受付中' : '停止中'}</span>
        </div>
        <div class="phase-card-body">
          <div class="order-count">依頼 <span>${orders.length}</span> 件</div>`;

      if (orders.length === 0) {
        html += '<div class="phase-empty">依頼なし</div>';
      } else {
        orders.forEach(o => {
          const statusCls = `status-${o.status ?? 'pending'}`;
          html += `<div class="order-item" onclick="openOrder('${esc(o.id)}')">
            <div class="order-item-name">${esc(o.name ?? '名前なし')}</div>
            <div class="order-item-type">${esc(o.type ?? '')}</div>
            <span class="order-item-status ${statusCls}">${STATUS_LABEL[o.status ?? 'pending']}</span>
          </div>`;
        });
      }
      html += '</div></div>';
    });
  }
  html += '</div>';
  document.getElementById('calContainer').innerHTML = html;
}

function openOrder(id) {
  const o = ordersData.find(x => x.id === id);
  if (!o) return;
  currentOrder = o;
  const body = document.getElementById('modalBody');
  body.innerHTML = [
    ['依頼ID',    o.id],
    ['タイプ',    o.type],
    ['希望時期',  o.periodLabel],
    ['お名前',    o.name],
    ['メール',    o.email],
    ['X ID',      o.xid || '-'],
    ['キャラクター説明', o.charDesc],
    ['要望・連絡事項', o.message || '-'],
    ['ステータス', STATUS_LABEL[o.status ?? 'pending']],
    ['送信日時',   new Date(o.submittedAt).toLocaleString('ja-JP')],
  ].map(([label, val]) =>
    `<div class="detail-row">
      <div class="detail-label">${esc(label)}</div>
      <div class="detail-value${label === 'キャラクター説明' || label === '要望・連絡事項' ? ' desc' : ''}">${esc(String(val ?? '-'))}</div>
    </div>`
  ).join('');
  document.getElementById('modalMsg').className = 'modal-msg';
  document.getElementById('modalOverlay').classList.add('open');
}

async function updateStatus(status) {
  if (!currentOrder) return;
  currentOrder.status = status;

  try {
    // ordersData を更新して PUT
    const idx = ordersData.findIndex(o => o.id === currentOrder.id);
    if (idx >= 0) ordersData[idx].status = status;

    await fetch(`https://api.jsonbin.io/v3/b/${BIN2_ID}`, {
      method: 'PUT', headers: H,
      body: JSON.stringify({ orders: ordersData })
    });
    const msg = document.getElementById('modalMsg');
    msg.textContent = `✓ ステータスを「${STATUS_LABEL[status]}」に更新しました`;
    msg.className = 'modal-msg show';
    renderCalendar();
  } catch {
    alert('更新に失敗しました');
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  currentOrder = null;
}

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadAll();
</script>
</body>
</html>
